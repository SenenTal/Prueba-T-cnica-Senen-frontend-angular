<app-session />
<div class="d-flex justify-content-start mb-3"><button class="btn btn-outline-secondary" routerLink="/articulos">Volver a Articulos</button></div>
<div class="container mt-4" *ngIf="articulo">
  <div class="card shadow">
    <div class="row g-0">
      <!-- Imagen -->
      <div class="col-md-6 d-flex align-items-center justify-content-center">
        <img 
          [src]="imagen"
          class="img-fluid p-4"
          style="max-height: 500px; object-fit: contain;">
      </div>
      <!-- Información -->
      <div class="col-md-6">
        <div class="card-body">
          <!-- Categoría -->
          <span class="badge bg-secondary">
            {{articulo.categoria}}
          </span>
          <!-- Titulo -->
          <h1 class="mt-3">
            {{articulo.titulo}}
          </h1>
          <!-- Precio -->
          <h2 class="text-success">
            $ {{articulo.precio}}
          </h2>
          <hr>
          <!-- Descripción -->
          <h5>Descripción</h5>
          <p class="text-muted">
            {{articulo.descripcion}}
          </p>
          <!-- Estado -->
          <div>
            <strong>Estado:</strong>
            <span 
              class="badge"
              [class.bg-success]="articulo.estadoArticulo"
              [class.bg-danger]="!articulo.estadoArticulo">
              {{articulo.estadoArticulo ? 'Disponible':'Vendido'}}
            </span>
          </div>
          <!-- Ubicación -->
          <p class="mt-3">
             {{articulo.ubicacion}}
          </p>
          <!-- Fecha -->
          <small class="text-muted">
            Publicado:
            {{articulo.fechaPublicacion | date:'dd/MM/yyyy'}}
          </small>
          <br>
          <div *ngIf="sesion && !esPropietario">
          <button 
            class="btn btn-primary mt-4"
            (click)="comprarProducto()">
            Comprar
          </button>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>
