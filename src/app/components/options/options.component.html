<div class="container mt-4">
    <!-- TÍTULO -->
    <h1 class="text-center mb-4">Opciones de Usuario</h1>
    <!-- CARD USUARIO -->
    <div class="card shadow-sm mx-auto mb-4" style="max-width: 500px;">
        <div class="card-body text-center">
            <h4 class="mb-2">{{user.usuario}}</h4>
            <p class="text-muted mb-1">{{user.nickname}}</p>
            <span class="badge bg-primary">{{user.role}}</span>
        </div>
    </div>
    <!-- ARTÍCULOS -->
    <div class="mb-4">
        <h3 class="mb-3">Artículos publicados</h3>
        <div class="card shadow-sm">
            <div class="card-body">
                <ul class="list-group list-group-flush">
                    @for(articulo of articulos; track articulo.idArticulo){
                    <li class="list-group-item d-flex justify-content-between align-items-center">
                        <span>{{articulo.titulo}}</span>
                        <span class="badge bg-secondary">${{articulo.precio}}</span>
                    </li>
                    }
                </ul>
            </div>
        </div>
    </div>
    <!-- BOTONES ACCIÓN -->
    <div class="d-flex gap-2 justify-content-center">
        <button class="btn btn-success" (click)="actualizarUsuario()">Actualizar Usuario</button>
        <button class="btn btn-danger" (click)="eliminarUsuario()">Eliminar Usuario</button>
    </div>
</div>
